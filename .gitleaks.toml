title = "Travel Agents - Secret Scanner"

[settings]
description = "Gitleaks config for travel-agents project"

# Exclude common paths that should never be scanned
[allowlist]
paths = [
  "docs/",
  "skills/",
  "workflow/",
  ".github/",
  "travel-agents-swarm.yaml",
  "scripts/backup-setup-soul-files.sh",
  "scripts/setup-travel-skills-comprehensive.sh"
]

[[rules]]
id = "AWS_ACCESS_KEY_ID"
description = "AWS Access Key ID pattern"
tags = ["keys"]
keywords = ["aws", "AKIA"]
regex = 'AKIA[0-9A-Z]{16}'
secret_group = "aws"

[[rules]]
id = "AWS_SECRET_ACCESS_KEY"
description = "AWS Secret Access Key pattern"
tags = ["keys"]
keywords = []
regex = '[A-Za-z0-9/+=]{40}'
secret_group = "aws"

[[rules]]
id = "GCP_CREDENTIALS"
description = "Google Cloud Platform credentials"
tags = ["keys"]
keywords = ["google", "GOOGLE", "ghp"]
regex = '(ghp_|glc_)[a-zA-Z0-9_-]{36,}'
secret_group = "gcp"

[[rules]]
id = "AZURE_STORAGE_ACCOUNT_KEY"
description = "Azure Storage Account Key"
tags = ["keys"]
keywords = ["azure", "StorageAccountKey"]
regex = '(?i)storageaccountkey.{0,50}[a-zA-Z0-9]{32,}'
secret_group = "azure"

# Disable overly generic rules that cause false positives
[[rules]]
id = "Generic API Key"
description = "Generic API key pattern - disabled due to false positives"
tags = ["generic", "keys"]
keywords = ["api", "API"]
regex = '(?i)(api[_]key|apikey).{0,50}[A-Za-z0-9+/=]{20,}'
secret_group = "generic"

[[rules]]
id = "Generic Secret Key"
description = "Generic secret key pattern - disabled due to false positives"
tags = ["keys"]
keywords = ["secret", "SECRET"]
regex = '(?i)secret.{0,50}[A-Za-z0-9+/=]{16,}'
secret_group = "generic"

[[rules]]
id = "Generic Password"
description = "Generic password pattern - disabled due to false positives"
tags = ["password", "credentials"]
keywords = ["password", "PASSWORD"]
regex = '(?i)password.{0,50}[A-Za-z0-9=]{16,}'
secret_group = "generic"

[[rules]]
id = "Generic Token"
description = "Generic token pattern - disabled due to false positives"
tags = ["tokens"]
keywords = ["token", "TOKEN", "pk", "PK"]
regex = '(?i)(token|pk|pk_).*[A-Za-z0-9+/=]{32,}'
secret_group = "generic"

[fix]
mode = false
