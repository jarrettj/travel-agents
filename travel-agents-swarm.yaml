      - swarm-pr-worker
      - swarm-worker-core
    capabilities:
      - github-triage
      - issue-reproduction
      - pr-patching
      - review-feedback
      - gh-cli
    preferredTaskTypes:
      - pr
      - issue
      - bugfix
      - github
      - triage
    maxConcurrentTasks: 1
    acceptsBroadcast: true
