<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Agents - Multi-Agent Booking Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            outline: none;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .submit-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            width: 100%;
            margin-top: 10px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .requests-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .request-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        .request-card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-submitted { background: #ff6b6b; color: white; }
        .status-processing { background: #ffd93d; color: #333; }
        .status-completed { background: #6bcb77; color: white; }
        .agent-badge {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 8px;
        }
        .status-text {
            color: #666;
            font-size: 14px;
        }
        .info-item {
            display: flex;
            margin: 8px 0;
            font-size: 14px;
        }
        .info-item strong {
            color: #666;
            min-width: 80px;
        }
        .message-item {
            background: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        .agent-message {
            color: #333;
            font-size: 14px;
        }
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ Travel Agents</h1>
            <p>Multi-Agent Booking Platform</p>
        </div>

        <!-- Request Form -->
        <div class="card">
            <h2 style="margin-bottom: 20px;">📝 Create New Request</h2>
            <form id="requestForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="destination">Destination</label>
                        <input type="text" id="destination" required placeholder="e.g., Paris, France">
                    </div>
                    
                    <div class="form-group">
                        <label for="tripType">Trip Type</label>
                        <select id="tripType">
                            <option value="vacation">Vacation</option>
                            <option value="business">Business</option>
                            <option value="adventure">Adventure</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dates">Dates</label>
                        <input type="text" id="dates" required placeholder="e.g., 2025-06-01 to 2025-06-07">
                    </div>

                    <div class="form-group">
                        <label for="travelers">Travelers</label>
                        <input type="number" id="travelers" min="1" value="2">
                    </div>

                    <div class="form-group">
                        <label for="budget">Budget (USD)</label>
                        <input type="number" id="budget" min="0" value="1000">
                    </div>
                </div>

                <div class="form-group">
                    <label for="preferences">Preferences (Optional)</label>
                    <textarea id="preferences" placeholder="e.g., Prefer non-stop flights, want hotel with pool..."></textarea>
                </div>

                <div class="form-group">
                    <label for="additionalMessage">Additional Context (Optional)</label>
                    <textarea id="additionalMessage" placeholder="Share any special requirements or preferences..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    ✈️ Create Request
                </button>
            </form>
        </div>

        <!-- Active Requests -->
        <div class="card">
            <h2 style="margin-bottom: 20px;">📊 Active Requests</h2>
            <div id="requestsList" class="requests-section">
                <!-- Request cards will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:8080/api';
        const AUTO_UPDATE_INTERVAL = 3000; // 3 seconds

        // State
        let activeRequestIds = new Set();

        // Fetch and render requests
        async function loadRequests() {
            try {
                const response = await fetch(`${API_BASE}/requests`);
                const requests = await response.json();
                renderRequests(requests);
            } catch (error) {
                console.error('Error loading requests:', error);
            }
        }

        // Render request cards
        function renderRequests(requests) {
            const container = document.getElementById('requestsList');
            container.innerHTML = '';

            if (requests.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">No active requests</p>';
                return;
            }

            requests.forEach(request => {
                const card = document.createElement('div');
                card.className = 'request-card';
                card.innerHTML = createRequestCardHTML(request);
                container.appendChild(card);
            });
        }

        function createRequestCardHTML(request) {
            let agentBadge = '';
            if (request.current_agent) {
                agentBadge = `<span class="agent-badge">${request.current_agent}</span>`;
            }

            return `
                <div>
                    <h3>${escapeHtml(request.destination)} ${agentBadge}</h3>
                    <span class="status-badge status-${request.status}">${request.status}</span>
                    
                    <div class="info-item">
                        <strong>Destination:</strong> ${escapeHtml(request.destination)}
                    </div>
                    <div class="info-item">
                        <strong>Dates:</strong> ${escapeHtml(request.dates)}
                    </div>
                    <div class="info-item">
                        <strong>Travelers:</strong> ${request.travelers}
                    </div>
                    <div class="info-item">
                        <strong>Budget:</strong> $${request.budget.toLocaleString()}
                    </div>
                    <div class="info-item">
                        <strong>Type:</strong> ${escapeHtml(request.trip_type)}
                    </div>

                    <div id="messages-${request.request_id}">
                        ${request.agent_messages.map(msg => `
                            <div class="message-item">
                                <strong>${escapeHtml(msg.agent)}:</strong>
                                <p class="agent-message">${escapeHtml(msg.message)}</p>
                            </div>
                        `).join('')}
                    </div>

                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${(request.completed_steps.length / 3) * 100}%"></div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Create request
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Creating...';

            const requestData = {
                destination: document.getElementById('destination').value,
                trip_type: document.getElementById('tripType').value,
                dates: document.getElementById('dates').value,
                travelers: parseInt(document.getElementById('travelers').value),
                budget: parseFloat(document.getElementById('budget').value),
                preferences: {
                    trip_type: document.getElementById('tripType').value
                },
                messages: document.getElementById('additionalMessage').value
            };

            try {
                const response = await fetch(`${API_BASE}/requests`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                const request = await response.json();
                activeRequestIds.add(request.request_id);
                loadRequests();
            } catch (error) {
                alert('Error creating request: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✈️ Create Request';
            }
        });

        // Auto-update requests
        setInterval(loadRequests, AUTO_UPDATE_INTERVAL);

        // Initial load
        loadRequests();
    </script>
</body>
</html>
